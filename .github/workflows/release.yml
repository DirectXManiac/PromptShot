name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v), e.g. 0.2.0'
        required: true

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="${{ github.event.inputs.version }}"
          else
            ver="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$ver" ]; then echo "Version is empty"; exit 1; fi
          echo "Version: $ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.flavour }}
    needs: resolve-version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavour: self-contained
            self_contained: 'true'
            extra_args: '/p:IncludeNativeLibrariesForSelfExtract=true'
            artifact_suffix: 'win-x64-self-contained'
          - flavour: framework-dependent
            self_contained: 'false'
            extra_args: ''
            artifact_suffix: 'win-x64'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PromptShot.sln

      - name: Test (release config)
        if: matrix.flavour == 'framework-dependent'
        run: dotnet test PromptShot.sln -c Release --no-restore --verbosity minimal

      - name: Publish ${{ matrix.flavour }}
        shell: pwsh
        run: |
          dotnet publish src/PromptShot/PromptShot.csproj `
            -c Release -r win-x64 `
            --self-contained ${{ matrix.self_contained }} `
            /p:PublishSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:Version=${{ needs.resolve-version.outputs.version }} `
            ${{ matrix.extra_args }} `
            -o publish

      - name: Rename artifact
        shell: pwsh
        run: |
          $v = '${{ needs.resolve-version.outputs.version }}'
          $suffix = '${{ matrix.artifact_suffix }}'
          New-Item -ItemType Directory -Path out -Force | Out-Null
          $name = "PromptShot-$v-$suffix.exe"
          Copy-Item publish/PromptShot.exe "out/$name"
          $size = (Get-Item "out/$name").Length
          $sizeMb = [math]::Round($size / 1MB, 2)
          Write-Host "Built $name : $sizeMb MB"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: PromptShot-${{ matrix.artifact_suffix }}
          path: out/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: downloaded
          merge-multiple: true

      - name: List downloaded files and sizes
        shell: bash
        run: |
          ls -la downloaded/
          for f in downloaded/*.exe; do
            size_mb=$(echo "scale=2; $(stat -c%s "$f") / 1048576" | bc)
            echo "$f : ${size_mb} MB"
          done

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd downloaded
          sha256sum *.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PromptShot ${{ needs.resolve-version.outputs.version }}
          files: |
            downloaded/PromptShot-${{ needs.resolve-version.outputs.version }}-win-x64-self-contained.exe
            downloaded/PromptShot-${{ needs.resolve-version.outputs.version }}-win-x64.exe
            downloaded/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload combined artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PromptShot-${{ needs.resolve-version.outputs.version }}
          path: downloaded/*
          if-no-files-found: error
