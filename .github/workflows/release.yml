name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v), e.g. 0.2.0'
        required: true

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="${{ github.event.inputs.version }}"
          else
            ver="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$ver" ]; then echo "Version is empty"; exit 1; fi
          echo "Version: $ver"
          echo "version=$ver" >> "$GITHUB_OUTPUT"

  build-self-contained:
    name: Build self-contained
    needs: resolve-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore PromptShot.sln
      - name: Publish self-contained
        shell: pwsh
        run: |
          dotnet publish src/PromptShot/PromptShot.csproj `
            -c Release -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:Version=${{ needs.resolve-version.outputs.version }} `
            -o publish
      - name: Rename and sanity-check
        shell: pwsh
        run: |
          $v = '${{ needs.resolve-version.outputs.version }}'
          New-Item -ItemType Directory -Path out -Force | Out-Null
          $name = "PromptShot-$v-win-x64-self-contained.exe"
          Copy-Item publish/PromptShot.exe "out/$name"
          $size = (Get-Item "out/$name").Length
          $sizeMb = [math]::Round($size / 1MB, 2)
          Write-Host "Built $name : $sizeMb MB"
          if ($sizeMb -lt 100) {
            throw "Self-contained build is suspiciously small ($sizeMb MB). Expected ~150 MB."
          }
      - uses: actions/upload-artifact@v4
        with:
          name: PromptShot-self-contained
          path: out/*.exe
          if-no-files-found: error

  build-framework-dependent:
    name: Build framework-dependent
    needs: resolve-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore PromptShot.sln
      - name: Test
        run: dotnet test PromptShot.sln -c Release --no-restore --verbosity minimal
      - name: Publish framework-dependent
        shell: pwsh
        run: |
          dotnet publish src/PromptShot/PromptShot.csproj `
            -c Release -r win-x64 `
            --self-contained false `
            /p:PublishSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false `
            /p:Version=${{ needs.resolve-version.outputs.version }} `
            -o publish
      - name: Rename and sanity-check
        shell: pwsh
        run: |
          $v = '${{ needs.resolve-version.outputs.version }}'
          New-Item -ItemType Directory -Path out -Force | Out-Null
          $name = "PromptShot-$v-win-x64.exe"
          Copy-Item publish/PromptShot.exe "out/$name"
          $size = (Get-Item "out/$name").Length
          $sizeMb = [math]::Round($size / 1MB, 2)
          Write-Host "Built $name : $sizeMb MB"
          # Framework-dependent should be a small launcher; bundling the
          # runtime accidentally would balloon it to ~150 MB. Catch that.
          if ($sizeMb -gt 10) {
            throw "Framework-dependent build is too large ($sizeMb MB). Expected <1 MB — the runtime got bundled."
          }
      - uses: actions/upload-artifact@v4
        with:
          name: PromptShot-framework-dep
          path: out/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [resolve-version, build-self-contained, build-framework-dependent]
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: downloaded
          merge-multiple: true

      - name: List downloaded files and sizes
        shell: bash
        run: |
          ls -la downloaded/
          for f in downloaded/*.exe; do
            size_mb=$(echo "scale=2; $(stat -c%s "$f") / 1048576" | bc)
            echo "$f : ${size_mb} MB"
          done

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd downloaded
          sha256sum *.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PromptShot ${{ needs.resolve-version.outputs.version }}
          files: |
            downloaded/PromptShot-${{ needs.resolve-version.outputs.version }}-win-x64-self-contained.exe
            downloaded/PromptShot-${{ needs.resolve-version.outputs.version }}-win-x64.exe
            downloaded/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload combined artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: PromptShot-${{ needs.resolve-version.outputs.version }}
          path: downloaded/*
          if-no-files-found: error
